<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div id="logo">Meirzhan</div>
        <nav id="nav-bar">
            <ul id="nav-list">
                <li class="nav-item"><a href="#about">About</a></li>
                <li class="nav-item"><a href="">Experience</a></li>
                <li class="nav-item"><a href="">Projects</a></li>

    <main>

                <p id="greet">Hello, I'm</p>
                <h1 id="name">Meirzhan Saparov</h1>

                <div id="profile-buttons">
                    <button type="button" id="download-btn">Download CV</button>
                    <button type="button" id="contact-btn">Contact Info</button>
                </div>
                <div id="site-logo">
                    <img src="assets/linkedin.png" alt="linkedin logo" class="contact-sites">
                    <img src="assets/github.png" alt="github logo" class="contact-sites">
                </div>
            </div>
        </section>

        <section id="about">
            <p>Get To Know More</p>
            <h1>About Me</h1>
        </section>
        
    </main>

</html>
